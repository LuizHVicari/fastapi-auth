<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar conta</title>
  <link rel="stylesheet" href="/static/oauth2.css">
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
      </svg>
    </div>

    <h1>Criar conta</h1>
    <p class="subtitle">Preencha os campos abaixo para criar sua conta.</p>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ action }}">
      {% for field in hidden_fields %}
      <input type="hidden" name="{{ field.name }}" value="{{ field.value }}">
      {% endfor %}

      <div class="field">
        <label for="traits.email">E-mail</label>
        <input
          type="email"
          id="traits.email"
          name="traits.email"
          autocomplete="email"
          placeholder="voce@exemplo.com"
          required
        >
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <input
          type="password"
          id="password"
          name="password"
          autocomplete="new-password"
          placeholder="••••••••"
          required
        >
      </div>

      <input type="hidden" name="method" value="password">

      <button type="submit" class="btn btn-primary btn-center" style="margin-top: 8px;">
        Criar conta
      </button>
    </form>

    <p class="note" style="margin-top: 16px;">
      Já tem uma conta?
      <a href="{{ login_url }}" style="color: var(--accent); text-decoration: none;">Entrar</a>
    </p>
  </div>
</body>
</html>
