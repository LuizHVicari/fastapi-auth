<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurar perfil</title>
  <link rel="stylesheet" href="/static/oauth2.css">
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
      </svg>
    </div>

    <h1>Configure seu perfil</h1>
    <p class="subtitle">Quase lá! Precisamos de mais algumas informações para criar seu perfil.</p>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/auth/setup-profile">
      {% if return_to %}
      <input type="hidden" name="return_to" value="{{ return_to }}">
      {% endif %}

      <div class="field">
        <label for="name">Seu nome</label>
        <input
          type="text"
          id="name"
          name="name"
          autocomplete="name"
          placeholder="João Silva"
          required
          minlength="2"
        >
      </div>

      <div class="field">
        <label for="avatar_url">URL do avatar <span style="color: var(--text-dim); font-weight: 400;">(opcional)</span></label>
        <input
          type="url"
          id="avatar_url"
          name="avatar_url"
          autocomplete="off"
          placeholder="https://exemplo.com/avatar.jpg"
        >
      </div>

      <button type="submit" class="btn btn-primary btn-center" style="margin-top: 8px;">
        Salvar e continuar
      </button>
    </form>
  </div>
</body>
</html>
