version: v0.13.0

dsn: postgres://app:app@postgres:5432/app?sslmode=disable&max_conns=20&max_idle_conns=4

serve:
  public:
    base_url: http://localhost:4433
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:3000

  admin:
    base_url: http://localhost:4434

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

selfservice:
  default_browser_return_url: http://localhost:3000

  methods:
    password:
      enabled: true
    oidc:
      enabled: true

  flows:
    registration:
      ui_url: http://localhost:3000/auth/registration
      after:
        password:
          hooks:
            - hook: session
            - hook: web_hook
              config:
                url: http://host.docker.internal:8000/webhooks/kratos/registration
                method: POST
                body: file:///etc/config/kratos/webhook.registration.jsonnet
                response:
                  ignore: false
                auth:
                  type: api_key
                  config:
                    name: x-kratos-secret
                    value: ""
                    in: header
        oidc:
          hooks:
            - hook: session
            - hook: web_hook
              config:
                url: http://host.docker.internal:8000/webhooks/kratos/registration
                method: POST
                body: file:///etc/config/kratos/webhook.registration.jsonnet
                response:
                  ignore: false
                auth:
                  type: api_key
                  config:
                    name: x-kratos-secret
                    value: ""
                    in: header

    login:
      ui_url: http://localhost:3000/auth/login
      after:
        password:
          hooks:
            - hook: require_verified_address

    logout:
      after:
        default_browser_return_url: http://localhost:3000

    verification:
      enabled: true
      ui_url: http://localhost:3000/auth/verification
      use: code

    recovery:
      enabled: true
      ui_url: http://localhost:3000/auth/recovery
      use: code

    settings:
      ui_url: http://localhost:3000/auth/settings
      privileged_session_max_age: 15m

courier:
  smtp:
    connection_uri: smtp://mailpit:1025/?skip_ssl_verify=true
    from_address: no-reply@dev.local
    from_name: Dev

session:
  lifespan: 720h
  earliest_possible_extend: 24h

log:
  level: debug
  format: json
  leak_sensitive_values: false