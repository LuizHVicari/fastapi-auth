# Copy this file to:
#   kratos.env.yml        — local dev (API running outside Docker)
#   kratos.env.docker.yml — docker dev (API running inside Docker, change URL below)
#
# Neither file should be committed — both are gitignored.
# Generate secrets with: openssl rand -base64 32

secrets:
  cookie:
    - "replace-with-openssl-rand-base64-32"
  cipher:
    - "replace-with-exactly-32-chars-secret!"

selfservice:
  flows:
    registration:
      after:
        password:
          hooks:
            - hook: session
            - hook: web_hook
              config:
                url: http://host.docker.internal:8000/webhooks/kratos/registration
                # for kratos.env.docker.yml, use: http://api:8080/webhooks/kratos/registration
                method: POST
                body: file:///etc/config/kratos/webhook.registration.jsonnet
                response:
                  ignore: false
                auth:
                  type: api_key
                  config:
                    name: x-kratos-secret
                    value: "replace-with-openssl-rand-base64-32"
                    in: header
        oidc:
          hooks:
            - hook: session
            - hook: web_hook
              config:
                url: http://host.docker.internal:8000/webhooks/kratos/registration
                # for kratos.env.docker.yml, use: http://api:8080/webhooks/kratos/registration
                method: POST
                body: file:///etc/config/kratos/webhook.registration.jsonnet
                response:
                  ignore: false
                auth:
                  type: api_key
                  config:
                    name: x-kratos-secret
                    value: "replace-with-openssl-rand-base64-32"
                    in: header
