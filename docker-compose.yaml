services:

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - infra

  kratos-migrate:
    image: oryd/kratos:v26.2.0
    environment:
      DSN: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/kratos?sslmode=disable&max_conns=20&max_idle_conns=4"
    volumes:
      - ./kratos/config:/etc/config/kratos
    command: migrate sql --read-from-env --yes
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    profiles:
      - infra

  kratos:
    image: oryd/kratos:v26.2.0
    environment:
      DSN: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/kratos?sslmode=disable&max_conns=20&max_idle_conns=4"
      LOG_LEVEL: debug
      KRATOS_PUBLIC_URL: "http://localhost:${KRATOS_PUBLIC_PORT}"
      KRATOS_ADMIN_URL: "http://localhost:${KRATOS_ADMIN_PORT}"
      FRONTEND_URL: "${FRONTEND_URL}"
      KRATOS_COOKIE_SECRET: "${KRATOS_COOKIE_SECRET}"
      KRATOS_CIPHER_SECRET: "${KRATOS_CIPHER_SECRET}"
      COURIER_SMTP_URI: "${COURIER_SMTP_URI}"
      COURIER_FROM_ADDRESS: "${COURIER_FROM_ADDRESS}"
      COURIER_FROM_NAME: "${COURIER_FROM_NAME}"
    command: serve --config /etc/config/kratos/kratos.yml --config /etc/config/kratos/${KRATOS_ENV_FILE:-kratos.env.yml} --dev --watch-courier
    ports:
      - "${KRATOS_PUBLIC_PORT}:4433"
      - "${KRATOS_ADMIN_PORT}:4434"
    volumes:
      - ./kratos/config:/etc/config/kratos
    depends_on:
      postgres:
        condition: service_healthy
      kratos-migrate:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    profiles:
      - infra
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4433/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  keto-migrate:
    image: oryd/keto:v26.2.0
    environment:
      DSN: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/keto?sslmode=disable&max_conns=20&max_idle_conns=4"
    volumes:
      - ./keto/config:/etc/config/keto
    command: migrate up --yes --config /etc/config/keto/keto.yml --config /etc/config/keto/keto.env.yml
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    profiles:
      - infra

  keto:
    image: oryd/keto:v26.2.0
    environment:
      DSN: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/keto?sslmode=disable&max_conns=20&max_idle_conns=4"
      LOG_LEVEL: debug
    command: serve --config /etc/config/keto/keto.yml --config /etc/config/keto/keto.env.yml
    ports:
      - "${KETO_READ_PORT}:4466"
      - "${KETO_WRITE_PORT}:4467"
    volumes:
      - ./keto/config:/etc/config/keto
    depends_on:
      postgres:
        condition: service_healthy
      keto-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    profiles:
      - infra
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4466/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  hydra-migrate:
    image: oryd/hydra:v2.3.0
    environment:
      DSN: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/hydra?sslmode=disable&max_conns=20&max_idle_conns=4"
    command: migrate sql up -e --yes
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    profiles:
      - infra

  hydra:
    image: oryd/hydra:v2.3.0
    environment:
      DSN: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/hydra?sslmode=disable&max_conns=20&max_idle_conns=4"
      LOG_LEVEL: debug
      URLS_SELF_ISSUER: "http://localhost:${HYDRA_PUBLIC_PORT}"
      URLS_CONSENT: "http://host.docker.internal:${API_PORT}/oauth2/consent"
      URLS_LOGIN: "http://host.docker.internal:${API_PORT}/oauth2/login"
      URLS_LOGOUT: "http://host.docker.internal:${API_PORT}/oauth2/logout"
    command: serve all --config /etc/config/hydra/hydra.yml --config /etc/config/hydra/hydra.env.yml --dev
    ports:
      - "${HYDRA_PUBLIC_PORT}:4444"
      - "${HYDRA_ADMIN_PORT}:4445"
    volumes:
      - ./hydra/config:/etc/config/hydra
    depends_on:
      postgres:
        condition: service_healthy
      hydra-migrate:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    profiles:
      - infra
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4444/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  hydra-setup:
    image: oryd/hydra:v2.3.0
    environment:
      HYDRA_ADMIN_URL: "http://hydra:4445"
    entrypoint: sh -c
    command:
      - |
        hydra create oauth2-client \
          --endpoint http://hydra:4445 \
          --id "${HYDRA_MCP_CLIENT_ID}" \
          --secret "${HYDRA_MCP_CLIENT_SECRET}" \
          --name "mcp-client" \
          --grant-type authorization_code,refresh_token \
          --response-type code \
          --scope openid,offline \
          --redirect-uri "${HYDRA_MCP_REDIRECT_URI}" \
          --token-endpoint-auth-method client_secret_post \
        || true
    depends_on:
      hydra:
        condition: service_healthy
    restart: on-failure
    profiles:
      - infra

  adminer:
    image: adminer:latest
    ports:
      - "${ADMINER_PORT}:8080"
    restart: unless-stopped
    profiles:
      - dev
      - infra

  mailpit:
    image: axllent/mailpit:latest
    environment:
      MP_MAX_MESSAGES: 1000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    ports:
      - "${MAILPIT_SMTP_PORT}:1025"
      - "${MAILPIT_WEB_PORT}:8025"
    restart: unless-stopped
    profiles:
      - dev
      - infra

  api:
    build: .
    environment:
      KRATOS_ADMIN_URL: "http://kratos:4434"
      KRATOS_PUBLIC_URL: "http://kratos:4433"
      KETO_READ_URL: "http://keto:4466"
      KETO_WRITE_URL: "http://keto:4467"
      MAILPIT_SMTP_HOST: "mailpit"
      MAILPIT_SMTP_PORT: 1025
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: 5432
    ports:
      - "${API_PORT}:8080"
    depends_on:
      kratos:
        condition: service_healthy
      keto:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - app

volumes:
  postgres_data:
